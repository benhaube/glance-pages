- name: Home
  # Show a title header on mobile web browsers
  show-mobile-header: true
  # Optionally, if you only have a single page you can hide the desktop navigation for a cleaner look
  # hide-desktop-navigation: true
  head-widgets:

    - $include: widgets/markets.yml

  columns:

    - size: small
      widgets:

        - $include: widgets/random-fact.yml
        - $include: widgets/bookmarks.yml

    - size: full
      widgets:

        - $include: widgets/search.yml
        - $include: widgets/hacker-news-lobsters-split.yml
        - $include: widgets/rss-home.yml
        - $include: widgets/youtube-home.yml
        - $include: widges/reddit-home.yml

    - size: small
      widgets:

        - $include: widgets/clock.yml
        - $include: widgets/weather.yml
        - $include: widgets/weather-aqi.yml 
        - $include: widgets/weather-forecast.yml
        - $include: widgets/calendar.yml
        - $include: widgets/releases.yml
